<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMC Color Matcher Pro - 刺繍糸色変換</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <h1>🧵 DMC Color Matcher Pro</h1>
      <p>プロフェッショナル刺繍糸カラーマッチング</p>
    </header>

    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="imageInput" accept="image/*" class="file-input-hidden">
      <div class="upload-placeholder">
        <span class="upload-icon">📷</span>
        <p>画像をドロップ または クリックして選択</p>
      </div>
    </div>

    <!-- Main Workspace -->
    <section class="workspace" id="workspace" style="display:none;">
      <!-- Left: Canvas Section -->
      <div class="canvas-section">
        <div class="canvas-container">
          <canvas id="imageCanvas"></canvas>
          <div class="color-picker-cursor" id="cursor"></div>
          <div class="minimap-container" id="minimapContainer">
            <canvas id="minimapCanvas"></canvas>
            <div class="minimap-viewport" id="minimapViewport"></div>
          </div>
        </div>

        <!-- Zoom Controls -->
        <div class="zoom-controls">
          <span class="control-label">🔍 拡大率</span>
          <input type="range" id="zoomSlider" min="0.1" max="16" step="0.1" value="1">
          <span id="zoomLevel">100%</span>
          <button id="zoomResetBtn" class="zoom-btn reset">リセット</button>
        </div>

        <p class="zoom-hint">💡 スクロールで拡大縮小 • クリックでスポイト • ドラッグで移動</p>

        <!-- Eyedropper Controls -->
        <div class="eyedropper-controls">
          <label>スポイトサイズ:</label>
          <div class="size-buttons" id="sizeButtons">
            <button class="size-btn active" data-size="1">1px</button>
            <button class="size-btn" data-size="2">2px</button>
            <button class="size-btn" data-size="3">3px</button>
            <button class="size-btn" data-size="5">5px</button>
          </div>
        </div>

        <!-- Brightness Correction -->
        <div class="brightness-controls">
          <label>明度補正:</label>
          <input type="range" id="brightnessSlider" min="-30" max="30" step="1" value="0">
          <span id="brightnessValue">0</span>
          <button id="brightnessResetBtn" class="brightness-reset-btn">リセット</button>
        </div>

        <!-- Picked Color Preview -->
        <div class="picked-color" id="pickedColor">
          <div class="color-swatch" id="colorSwatch"></div>
          <div class="color-info">
            <p id="rgbValue">RGB: -</p>
            <p id="hexValue">HEX: -</p>
          </div>
          <button id="findMatchBtn" class="btn-primary" disabled>DMC色を検索</button>
        </div>

        <!-- Match Results -->
        <div class="results-section" id="resultsSection" style="display:none;">
          <h3>🎯 マッチング結果</h3>
          <div class="match-list" id="matchList"></div>
        </div>
      </div>

      <!-- Right: Legend Section -->
      <div class="legend-section" id="legendSection">
        <div class="legend-header">
          <h2>📋 Color Legend</h2>
          <div class="legend-actions">
            <button id="clearHistoryBtn" class="btn-icon" title="履歴をクリア">🗑️</button>
            <button id="exportCsvBtn" class="btn-icon" title="CSV出力">📥</button>
            <button id="exportPdfBtn" class="btn-icon" title="PDF出力">📄</button>
          </div>
        </div>
        <div class="legend-list" id="legendList">
          <div class="legend-empty">
            <p>色を抽出すると、ここに凡例が表示されます</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="ciede2000.js"></script>
  <script src="app.js"></script>
</body>

</html>
