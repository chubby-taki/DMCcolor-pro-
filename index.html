<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMC Color Matcher Pro - 刺繍糸色変換</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- Header (Full) -->
    <header class="header" id="headerFull">
      <h1>DMC Color Matcher Pro</h1>
      <p>刺繍糸カラーマッチング</p>
    </header>

    <!-- Header (Compact - shown during workspace) -->
    <header class="header-compact" id="headerCompact" style="display:none;">
      <span class="header-compact-title">DMC Color Matcher Pro</span>
      <button id="changeImageBtn" class="btn-change-image">画像を変更</button>
      <input type="file" id="imageInputCompact" accept="image/*" style="display:none;">
    </header>

    <!-- Upload Area -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="imageInput" accept="image/*" class="file-input-hidden">
      <div class="upload-placeholder">
        <span class="upload-icon">📷</span>
        <p>画像をドロップ または クリックして選択</p>
      </div>
    </div>

    <!-- Main Workspace -->
    <section class="workspace" id="workspace" style="display:none;">
      <!-- Left: Canvas + Controls -->
      <div class="canvas-section">
        <div class="canvas-container">
          <canvas id="imageCanvas"></canvas>
          <div class="color-picker-cursor" id="cursor"></div>
          <div class="minimap-container" id="minimapContainer">
            <canvas id="minimapCanvas"></canvas>
            <div class="minimap-viewport" id="minimapViewport"></div>
          </div>
        </div>

        <!-- Compact Toolbar -->
        <div class="toolbar">
          <div class="toolbar-group">
            <span class="toolbar-label">拡大</span>
            <input type="range" id="zoomSlider" min="0.1" max="16" step="0.1" value="1">
            <span id="zoomLevel" class="toolbar-value">100%</span>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <span class="toolbar-label">スポイト</span>
            <div class="size-buttons" id="sizeButtons">
              <button class="size-btn active" data-size="1">1</button>
              <button class="size-btn" data-size="2">2</button>
              <button class="size-btn" data-size="3">3</button>
              <button class="size-btn" data-size="5">5</button>
            </div>
          </div>
          <div class="toolbar-divider"></div>
          <div class="toolbar-group">
            <span class="toolbar-label">明度</span>
            <input type="range" id="brightnessSlider" min="-30" max="30" step="1" value="0">
            <span id="brightnessValue" class="toolbar-value">0</span>
            <button id="brightnessResetBtn" class="toolbar-reset">↺</button>
          </div>
        </div>

        <!-- Hero: Color Match Area -->
        <div class="color-match-hero" id="colorMatchHero">
          <div class="picked-area">
            <div class="picked-label">抽出した色</div>
            <div class="picked-display">
              <div class="color-swatch-large" id="colorSwatch"></div>
              <div class="color-info">
                <p id="rgbValue">-</p>
                <p id="hexValue">-</p>
              </div>
            </div>
          </div>
          <div class="match-arrow">→</div>
          <div class="results-area" id="resultsSection">
            <div class="results-label">DMCマッチ</div>
            <div class="match-list" id="matchList">
              <div class="match-empty">画像をクリックして色を拾ってください</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Legend Section -->
      <div class="legend-section" id="legendSection">
        <div class="legend-header">
          <h2>Color Legend</h2>
          <div class="legend-actions">
            <button id="clearHistoryBtn" class="btn-icon" title="履歴をクリア">🗑️</button>
            <button id="exportCsvBtn" class="btn-icon" title="CSV出力">📥</button>
            <button id="exportPdfBtn" class="btn-icon" title="PDF出力">📄</button>
          </div>
        </div>
        <div class="legend-list" id="legendList">
          <div class="legend-empty">
            <p>マッチング結果をクリックすると<br>ここに追加されます</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="ciede2000.js"></script>
  <script src="app.js"></script>
</body>

</html>
